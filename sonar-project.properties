sonar.projectKey=SecureVault
sonar.projectName=SecureVault
sonar.exclusions=**/obj/**,**/bin/**,**/Migrations/**,**/node_modules/**,**/.nuxt/**,**/dist/**,**/coverage/**,**/test-results/**,**/playwright-report/**,**/frontend/playwright-report/**

# Coverage and test results under repo root TestResults/ (script uses same globs from src/ as ../TestResults/**)
sonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=TestResults/**/*.trx