# .env is optional: defaults (e.g. POSTGRES_PASSWORD) allow "docker compose up" with no setup.
# For production, copy .env.example to .env and set Encryption__MasterKeyBase64 and strong POSTGRES_PASSWORD.
# All services use network securevault_net and resolve by service name (postgres, redis, api).

services:
  postgres:
    image: postgres:15-alpine
    container_name: securevault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: securevault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securevault}
      POSTGRES_DB: securevault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securevault"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - securevault_net

  redis:
    image: redis:7-alpine
    container_name: securevault-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - securevault_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: securevault-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - securevault_net

  sonarqube-db:
    image: postgres:15-alpine
    container_name: securevault-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SONAR_POSTGRES_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD:-sonar}
      POSTGRES_DB: ${SONAR_POSTGRES_DB:-sonar}
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_POSTGRES_USER:-sonar}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - securevault_net

  sonarqube:
    image: sonarqube:lts
    container_name: securevault-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONAR_POSTGRES_DB:-sonar}
      SONAR_JDBC_USERNAME: ${SONAR_POSTGRES_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_POSTGRES_PASSWORD:-sonar}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      sonarqube-db:
        condition: service_healthy
    # No healthcheck: official image has no curl/wget. Allow 2+ min for first start; scanners retry/wait.
    networks:
      - securevault_net

  api:
    build:
      context: ./src
      dockerfile: SecureVault.Api/Dockerfile
    container_name: securevault-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=securevault;Username=securevault;Password=${POSTGRES_PASSWORD:-securevault}
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      SecureVault__BaseUrl: ${SECUREVAULT_BASE_URL:-http://localhost:3000}
      Cors__Origins: ${CORS_ORIGINS:-http://localhost:3000}
      RunMigrations: "true"
      # Dev-only default so "docker compose up" works without .env; override via .env for real use
      Encryption__MasterKeyBase64: ${Encryption__MasterKeyBase64:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - securevault_net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080}
    container_name: securevault-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080}
      NUXT_API_BASE: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', (r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - securevault_net

  audit-consumer:
    build:
      context: ./src
      dockerfile: Dockerfile.Consumer
    container_name: securevault-audit-consumer
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=securevault;Username=securevault;Password=${POSTGRES_PASSWORD:-securevault}
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Exchange: securevault.audit
      RabbitMQ__QueueName: securevault.audit.log
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - securevault_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: securevault-pgadmin
    restart: unless-stopped
    user: root
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - securevault_net

networks:
  securevault_net:
    driver: bridge

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_db_data:
  pgadmin_data: