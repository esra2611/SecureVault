name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/SecureVault.sln

      - name: Build
        run: dotnet build src/SecureVault.sln --no-restore -c Release

      - name: Unit tests (Coverlet)
        run: |
          dotnet test src/SecureVault.Tests.Unit/SecureVault.Tests.Unit.csproj -c Release --no-build \
            --logger "trx;LogFileName=unit.trx" \
            --collect:"XPlat Code Coverage" \
            --settings src/SecureVault.Tests.Unit/coverage.runsettings \
            --results-directory coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Merge coverage and check threshold (≥ 80%)
        run: |
          COVERAGE_DIR="coverage/report"
          mkdir -p "$COVERAGE_DIR"
          REPORTS=$(find coverage -name "coverage.opencover.xml" 2>/dev/null | tr '\n' ';' | sed 's/;$//')
          if [ -z "$REPORTS" ]; then
            echo "No coverage files found. Failing."
            exit 1
          fi
          reportgenerator "-reports:$REPORTS" "-targetdir:$COVERAGE_DIR" "-reporttypes:TextSummary;Html"
          LINE_COV=$(grep -E "Line coverage" "$COVERAGE_DIR/Summary.txt" | grep -oE '[0-9]+\.?[0-9]*' | head -1)
          echo "Line coverage: ${LINE_COV}%"
          if [ -z "$LINE_COV" ]; then
            echo "Could not parse line coverage. Failing."
            exit 1
          fi
          if [ "$(echo "$LINE_COV >= 80" | bc)" -eq 0 ]; then
            echo "Coverage ${LINE_COV}% is below 80%. Failing."
            exit 1
          fi
          echo "Coverage ${LINE_COV}% meets 80% threshold."

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report

      - name: Integration tests (Testcontainers)
        run: |
          dotnet test src/SecureVault.sln -c Release --no-build \
            --filter "FullyQualifiedName~SecureVault.Tests.Integration" \
            --logger "trx;LogFileName=integration.trx"

      - name: Mutation testing (Stryker ≥ 60%)
        run: |
          dotnet tool install -g dotnet-stryker
          export PATH="$HOME/.dotnet/tools:$PATH"
          cd src/SecureVault.Tests.Unit && dotnet stryker --break-at 60 --solution ../SecureVault.sln

      - name: Prepare Stryker HTML report for artifact
        id: stryker-html
        if: always()
        run: |
          REPORT=$(find src/SecureVault.Tests.Unit/StrykerOutput -name "mutation-report.html" 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            mkdir -p stryker-report
            cp "$REPORT" stryker-report/mutation-report.html
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Stryker HTML report: $REPORT"
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Stryker report (full output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: src/SecureVault.Tests.Unit/StrykerOutput/

      - name: Upload Stryker HTML report
        if: always() && steps.stryker-html.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report-html
          path: stryker-report/

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Generate encryption key
        run: echo "Encryption__MasterKeyBase64=$(openssl rand -base64 32)" >> $GITHUB_ENV

      - name: Start services
        run: docker compose up -d postgres redis rabbitmq api

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            sleep 2
          done

      - name: Install frontend and Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8080

      - name: Run E2E (Playwright)
        working-directory: frontend
        run: |
          npm run preview &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ > /dev/null && break
            sleep 2
          done
          npm run test:e2e
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8080

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Tear down
        if: always()
        run: docker compose down -v
